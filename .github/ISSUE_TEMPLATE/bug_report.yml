name: Bug Report
description: Report a tool that isn't working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: tool
    attributes:
      label: Tool name
      description: Which kaiten_* tool is affected?
      placeholder: "kaiten_search_cards"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Include the error message if any.
      placeholder: "Called kaiten_search_cards with tagIds='123' but got all cards instead of filtered results."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Call kaiten_search_cards with boardId=X and tagIds="123"
        2. Observe that all cards are returned, not just tagged ones
    validations:
      required: false

  - type: dropdown
    id: mcp-client
    attributes:
      label: MCP Client
      options:
        - Claude Code
        - Claude Desktop
        - Cursor
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: kaiten-mcp version
      placeholder: "0.1.7"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.0.0"
    validations:
      required: false
